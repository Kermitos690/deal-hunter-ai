name: Deal Hunter radar scheduler

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deal-hunter-radar-scheduler
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run due radars
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --retry 3 --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://deal-hunter-ai.vercel.app/api/cron/scan)"
          printf '%s' "$response" | jq -e 'all(.results[]?; .ok == true)'

      - name: Run auction reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error --retry 3 --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://deal-hunter-ai.vercel.app/api/cron/reminders

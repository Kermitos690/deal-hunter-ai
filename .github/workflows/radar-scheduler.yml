name: Deal Hunter radar scheduler

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deal-hunter-radar-scheduler
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://deal-hunter-ai.vercel.app' }}

    steps:
      - name: Validate scheduler configuration
        run: |
          set -euo pipefail
          test -n "${CRON_SECRET}" || { echo "CRON_SECRET is missing" >&2; exit 1; }
          case "${APP_BASE_URL}" in
            https://*) ;;
            *) echo "APP_BASE_URL must use HTTPS" >&2; exit 1 ;;
          esac

      - name: Run due radars
        run: |
          set -euo pipefail
          base_url="${APP_BASE_URL%/}"
          response="$(curl --fail-with-body --silent --show-error \
            --retry 1 --retry-delay 2 --retry-connrefused --max-time 240 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/scan")"
          printf '%s\n' "$response"
          printf '%s' "$response" | jq -e '(.results | type == "array") and all(.results[]?; .ok == true)'
          total="$(printf '%s' "$response" | jq '.results | length')"
          echo "### Radar scans" >> "$GITHUB_STEP_SUMMARY"
          echo "- Results: ${total}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run email alert fast lane
        run: |
          set -euo pipefail
          base_url="${APP_BASE_URL%/}"
          response="$(curl --fail-with-body --silent --show-error \
            --retry 1 --retry-delay 2 --retry-connrefused --max-time 180 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/email-alerts")"
          printf '%s\n' "$response"
          printf '%s' "$response" | jq -e '(.results | type == "array") and all(.results[]?; .ok == true)'
          total="$(printf '%s' "$response" | jq '.results | length')"
          echo "### Email alert fast lane" >> "$GITHUB_STEP_SUMMARY"
          echo "- Results: ${total}" >> "$GITHUB_STEP_SUMMARY"

name: Deal Hunter radar scheduler

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deal-hunter-radar-scheduler
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Run due radars
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://deal-hunter-ai.vercel.app' }}
        run: |
          set -euo pipefail
          base_url="${APP_BASE_URL%/}"
          response="$(curl --fail --silent --show-error --retry 2 --max-time 360 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/scan")"
          printf '%s\n' "$response"
          printf '%s' "$response" | jq -e '(.results | type == "array") and all(.results[]?; .ok == true)'

      - name: Run auction reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://deal-hunter-ai.vercel.app' }}
        run: |
          set -euo pipefail
          base_url="${APP_BASE_URL%/}"
          curl --fail --silent --show-error --retry 2 --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/reminders"

name: Apply Pokémon vertical batch

on:
  push:
    branches:
      - feat/pokemon-referrals-channels-2026
    paths:
      - .github/workflows/apply-pokemon-vertical.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pokemon-referrals-channels-2026
          fetch-depth: 0
      - name: Apply tested Pokémon vertical files
        shell: bash
        env:
          POKEMON_VERTICAL_ARCHIVE: >-
            [... truncated for display ...]
        run: |
          set -euo pipefail
          python - <<'PYCODE'
          import base64, io, os, tarfile
          payload = base64.b64decode(os.environ["POKEMON_VERTICAL_ARCHIVE"])
          with tarfile.open(fileobj=io.BytesIO(payload), mode="r:gz") as archive:
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise RuntimeError(f"Unsafe archive path: {member.name}")
              archive.extractall(".")
          PYCODE
          git rm .github/workflows/apply-pokemon-vertical.yml
          git config user.name "Deal Hunter Automation"
          git config user.email "actions@users.noreply.github.com"
          git add saas/src
          git commit -m "Add Pokémon TCG vertical and 2025-2026 release intelligence"
          git push origin HEAD:feat/pokemon-referrals-channels-2026

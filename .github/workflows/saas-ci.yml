name: Deal Hunter SaaS CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "saas/**"
      - "vercel.json"
      - ".github/workflows/saas-ci.yml"
  push:
    branches: [main]
    paths:
      - "saas/**"
      - "vercel.json"
      - ".github/workflows/saas-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deal-hunter-saas-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: saas
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      SESSION_SECRET: ci-session-secret-with-at-least-32-characters
      APP_BASE_URL: http://localhost:3000
      BETA_PRIVATE_MODE: "true"
      ENABLE_STRIPE: "false"
      ENABLE_WHATSAPP: "false"
      ENABLE_MOCK_SOURCE: "false"
      ENABLE_EBAY_SOURCE: "false"
      ENABLE_EBAY_PRIORITY_SOURCE: "false"
      ENABLE_RICARDO_SOURCE: "false"
      ENABLE_ANIBIS_SOURCE: "false"
      ENABLE_TUTTI_SOURCE: "false"
      ENABLE_KOMEHYO_SOURCE: "false"
      ENABLE_YAHOO_JAPAN_SOURCE: "false"
      ENABLE_RSS_SOURCE: "false"
      ENABLE_EMAIL_ALERTS_SOURCE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: saas/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

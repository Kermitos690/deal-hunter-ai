name: Sync eBay secrets to Vercel

on:
  push:
    branches:
      - codex/deal-hunter-saas-v1
    paths:
      - .github/workflows/sync-ebay-to-vercel.yml

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACES: ${{ secrets.EBAY_MARKETPLACES }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
      - run: npm install --global vercel@latest
      - name: Sync and deploy
        working-directory: saas
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

          for environment in production preview; do
            vercel env add EBAY_CLIENT_ID "$environment" --value "$EBAY_CLIENT_ID" --force --yes --sensitive --token "$VERCEL_TOKEN"
            vercel env add EBAY_CLIENT_SECRET "$environment" --value "$EBAY_CLIENT_SECRET" --force --yes --sensitive --token "$VERCEL_TOKEN"
          done

          vercel env add EBAY_CLIENT_ID development --value "$EBAY_CLIENT_ID" --force --yes --token "$VERCEL_TOKEN"
          vercel env add EBAY_CLIENT_SECRET development --value "$EBAY_CLIENT_SECRET" --force --yes --token "$VERCEL_TOKEN"

          for environment in production preview development; do
            vercel env add EBAY_MARKETPLACES "$environment" --value "$EBAY_MARKETPLACES" --force --yes --no-sensitive --token "$VERCEL_TOKEN"
            vercel env add ENABLE_EBAY_SOURCE "$environment" --value "true" --force --yes --no-sensitive --token "$VERCEL_TOKEN"
            vercel env add ENABLE_MOCK_SOURCE "$environment" --value "false" --force --yes --no-sensitive --token "$VERCEL_TOKEN"
          done

          vercel deploy --prod --yes --token "$VERCEL_TOKEN"

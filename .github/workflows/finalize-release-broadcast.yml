name: Finalize validated Telegram release broadcast

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-release-broadcast.yml

permissions:
  contents: write

concurrency:
  group: finalize-release-broadcast-20260715
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Invoke dispatcher and verify idempotence
        id: broadcast
        shell: bash
        run: |
          set -Eeuo pipefail

          endpoint="https://deal-hunter-ai.vercel.app/api/internal/release-broadcast/dh-qie-20260715-b5f4d2"
          result_path="docs/telegram-release-broadcast-20260715-result.json"
          mkdir -p "$(dirname "$result_path")" .tmp-release-broadcast

          success=false
          blocker=""
          http_code="000"
          : > .tmp-release-broadcast/first.json
          : > .tmp-release-broadcast/second.json

          for attempt in $(seq 1 30); do
            http_code=$(curl --connect-timeout 15 --max-time 330 -sS -o .tmp-release-broadcast/first.json -w '%{http_code}' "$endpoint" || true)
            error=$(jq -r '.error // empty' .tmp-release-broadcast/first.json 2>/dev/null || true)

            if [[ "$http_code" == "200" ]] && jq -e '
              .ok == true and
              .remaining == 0 and
              .has_more == false and
              .status == "completed" and
              (.sent | type == "number") and
              (.failed | type == "number") and
              (.blocked | type == "number") and
              (.skipped | type == "number")
            ' .tmp-release-broadcast/first.json >/dev/null 2>&1; then
              success=true
              break
            fi

            if [[ "$http_code" == "409" && "$error" == "BROADCAST_ALREADY_RUNNING" ]]; then
              sleep 15
              continue
            fi

            if [[ "$http_code" =~ ^(000|404|408|425|429|500|502|503|504)$ ]]; then
              sleep 15
              continue
            fi

            blocker="FIRST_CALL_HTTP_${http_code}_${error:-UNEXPECTED_RESPONSE}"
            break
          done

          if [[ "$success" == "true" ]]; then
            second_code=$(curl --connect-timeout 15 --max-time 90 -sS -o .tmp-release-broadcast/second.json -w '%{http_code}' "$endpoint" || true)

            if [[ "$second_code" != "200" ]] || ! jq -e --slurpfile first .tmp-release-broadcast/first.json '
              .ok == true and
              .already_completed == true and
              .remaining == 0 and
              .has_more == false and
              .status == "completed" and
              .sent == $first[0].sent and
              .failed == $first[0].failed and
              .blocked == $first[0].blocked and
              .skipped == $first[0].skipped
            ' .tmp-release-broadcast/second.json >/dev/null 2>&1; then
              success=false
              second_error=$(jq -r '.error // empty' .tmp-release-broadcast/second.json 2>/dev/null || true)
              blocker="IDEMPOTENCE_CHECK_HTTP_${second_code}_${second_error:-MISMATCH}"
            fi
          fi

          normalize_json() {
            local file="$1"
            if jq -e . "$file" >/dev/null 2>&1; then
              cat "$file"
            else
              jq -Rs '{raw: .}' < "$file"
            fi
          }

          first_payload=$(normalize_json .tmp-release-broadcast/first.json)
          second_payload=$(normalize_json .tmp-release-broadcast/second.json)

          if [[ "$success" == "true" ]]; then
            jq -n \
              --arg status "verified_completed" \
              --arg endpoint "$endpoint" \
              --arg verified_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --argjson first "$first_payload" \
              --argjson second "$second_payload" \
              '{status:$status, endpoint:$endpoint, verified_at:$verified_at, first_call:$first, idempotence_check:$second}' \
              > "$result_path"
          else
            jq -n \
              --arg status "blocker" \
              --arg endpoint "$endpoint" \
              --arg blocker "${blocker:-NO_VERIFIED_COMPLETION_AFTER_RETRIES}" \
              --arg checked_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --argjson first "$first_payload" \
              --argjson second "$second_payload" \
              '{status:$status, endpoint:$endpoint, blocker:$blocker, checked_at:$checked_at, first_call:$first, idempotence_check:$second}' \
              > "$result_path"
          fi

          echo "success=$success" >> "$GITHUB_OUTPUT"
          echo "result_path=$result_path" >> "$GITHUB_OUTPUT"

      - name: Remove temporary dispatcher and workflow after verification
        if: steps.broadcast.outputs.success == 'true'
        shell: bash
        run: |
          rm -rf saas/src/app/api/internal/release-broadcast/dh-qie-20260715-b5f4d2
          rm -f .github/workflows/finalize-release-broadcast.yml

      - name: Commit audit result and cleanup
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No repository changes to commit"
            exit 0
          fi

          if [[ "${{ steps.broadcast.outputs.success }}" == "true" ]]; then
            sent=$(jq -r '.first_call.sent' docs/telegram-release-broadcast-20260715-result.json)
            failed=$(jq -r '.first_call.failed' docs/telegram-release-broadcast-20260715-result.json)
            blocked=$(jq -r '.first_call.blocked' docs/telegram-release-broadcast-20260715-result.json)
            skipped=$(jq -r '.first_call.skipped' docs/telegram-release-broadcast-20260715-result.json)
            git commit -m "Finalize Telegram release broadcast: sent ${sent}, failed ${failed}, blocked ${blocked}, skipped ${skipped}"
          else
            git commit -m "Record Telegram release broadcast blocker"
          fi

          git push origin HEAD:main

      - name: Surface concrete blocker
        if: steps.broadcast.outputs.success != 'true'
        shell: bash
        run: |
          cat docs/telegram-release-broadcast-20260715-result.json
          exit 1

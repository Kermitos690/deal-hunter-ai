name: Deal Hunter beta readiness

on:
  push:
    branches:
      - feat/beta-readiness-final
  pull_request:
    paths:
      - "saas/**"
      - ".github/workflows/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: deal-hunter-beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: saas
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saas/package-lock.json

      - name: Build repository inventory
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Deal Hunter repository inventory"
            echo
            echo "## Files"
            find saas/src saas/supabase saas/scripts .github/workflows -type f | sort
            echo
            echo "## Next.js route handlers"
            find saas/src/app -type f \( -name 'route.ts' -o -name 'page.tsx' -o -name 'layout.tsx' \) | sort
            echo
            echo "## Supabase migrations"
            find saas/supabase/migrations -maxdepth 1 -type f | sort
            echo
            echo "## Environment variable names referenced"
            grep -RhoE 'process\.env\.[A-Z0-9_]+' saas/src saas/scripts | sed 's/process\.env\.//' | sort -u || true
            echo
            echo "## TODO / FIXME markers"
            grep -RInE 'TODO|FIXME|HACK|XXX' saas/src saas/scripts saas/supabase .github/workflows || true
            echo
            echo "## Files importing serviceDb"
            grep -RIl 'serviceDb' saas/src | sort || true
            echo
            echo "## Client files mentioning service role"
            grep -RIl 'SUPABASE_SERVICE_ROLE_KEY' saas/src | sort || true
            echo
            echo "## Potential hard-coded live credentials (filenames only)"
            grep -RIlE 'sk_live_[A-Za-z0-9]+|bot[0-9]{6,}:[A-Za-z0-9_-]{20,}|eyJhbGciOiJIUzI1Ni' saas .github --exclude-dir=node_modules || true
          } | tee beta-audit.txt

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee tests.log

      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload beta audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deal-hunter-beta-audit-${{ github.run_id }}
          path: |
            beta-audit.txt
            saas/lint.log
            saas/typecheck.log
            saas/tests.log
            saas/build.log
            saas/coverage
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce quality gate
        if: always()
        shell: bash
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          printf 'lint=%s typecheck=%s tests=%s build=%s\n' "$LINT_OUTCOME" "$TYPECHECK_OUTCOME" "$TESTS_OUTCOME" "$BUILD_OUTCOME"
          test "$LINT_OUTCOME" = success
          test "$TYPECHECK_OUTCOME" = success
          test "$TESTS_OUTCOME" = success
          test "$BUILD_OUTCOME" = success

name: Integrate query intelligence once

on:
  push:
    branches: [feat/query-intelligence-engine]
    paths:
      - .github/workflows/query-intelligence-integrate-once.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/query-intelligence-engine
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saas/package-lock.json
      - name: Patch query engine and eBay adapter
        run: |
          python3 - <<'PY'
          from pathlib import Path

          query_path = Path('saas/src/lib/query-intelligence.ts')
          query_text = query_path.read_text()

          exact_anchor = '''  push(exactBase, "exact");
  if (cores.length) push(cores.join(" "), "exact");

  const primaryCores = cores.length ? cores : [""];
'''
          exact_replacement = '''  push(exactBase, "exact");
  if (cores.length) push(cores.join(" "), "exact");

  // Combine detected intentions before generic expansion. This makes niche,
  // multilingual searches useful immediately (e.g. mascot + glasses).
  if (intents.length > 1) {
    const primarySignals = intents.map((intent) => unique([
      ...intent.categoryHints,
      ...intent.synonyms,
      ...intent.translations,
    ]).slice(0, 5));
    const first = primarySignals[0] ?? [];
    const second = primarySignals[1] ?? [];
    for (const left of first) {
      for (const right of second) {
        push([left, right].join(" "), "expanded");
        push([cores[0], left, right].filter(Boolean).join(" "), "expanded");
        if (output.length >= Math.min(limit, 12)) break;
      }
      if (output.length >= Math.min(limit, 12)) break;
    }
  }

  const primaryCores = cores.length ? cores : [""];
'''
          if exact_anchor not in query_text:
            raise SystemExit('query expansion anchor not found')
          query_text = query_text.replace(exact_anchor, exact_replacement)

          old_tail = '''  const hasCore = !cores.length || cores.some((term) => normalizedTitle.includes(term));
  const hasIntent = !intentSignals.length || intentSignals.some((term) => normalizedTitle.includes(term));

  // A precise brand/model/keyword match is enough. For generic searches, require an intent signal.
  if (cores.length) return hasCore;
  return hasIntent;
}'''
          new_tail = '''  const hasCore = !cores.length || cores.some((term) => normalizedTitle.includes(term));
  const intentMatches = intents.map((intent) => unique([
    ...intent.categoryHints,
    ...intent.synonyms,
    ...intent.translations,
    ...(intent.sellerTerms ?? []),
  ]).map(normalize).some((term) => normalizedTitle.includes(term)));
  const hasIntent = !intentSignals.length || intentSignals.some((term) => normalizedTitle.includes(term));

  // Keep exact product wording when available. For translated/niche requests,
  // accept a title that satisfies every detected intent (e.g. eyewear + costume).
  if (cores.length && hasCore) return true;
  if (intents.length > 1) return intentMatches.every(Boolean);
  return !cores.length && hasIntent;
}'''
          if old_tail not in query_text:
            raise SystemExit('query relevance tail not found')
          query_path.write_text(query_text.replace(old_tail, new_tail))

          path = Path('saas/src/sources/ebay.adapter.ts')
          text = path.read_text()
          old_import = 'import { isWatchCategory, looksLikeCompleteWatchTitle, searchTermAlternatives } from "@/lib/search-precision";\n'
          new_import = 'import { intelligentSearchQueries, isIntelligentlyRelevantListing } from "@/lib/query-intelligence";\nimport { isWatchCategory, looksLikeCompleteWatchTitle } from "@/lib/search-precision";\n'
          if old_import not in text:
            raise SystemExit('search precision import not found')
          text = text.replace(old_import, new_import)

          start = text.index('function keywordCombinations(')
          end = text.index('\nfunction priorityMarketplaces', start)
          replacement = '''export function ebaySearchQueries(radar: Pick<Radar, "brands" | "models" | "include_keywords" | "category">) {
  return intelligentSearchQueries(radar, 24);
}
'''
          text = text[:start] + replacement + text[end:]

          old_relevance = '''export function isRelevantEbayListing(title: string, category: string, expectedTerms: string[] = []) {
  if (!isWatchCategory(category)) return true;
  return looksLikeCompleteWatchTitle(title, expectedTerms);
}'''
          new_relevance = '''export function isRelevantEbayListing(
  title: string,
  radar: Pick<Radar, "brands" | "models" | "include_keywords" | "category">,
  expectedTerms: string[] = [],
) {
  if (isWatchCategory(radar.category)) return looksLikeCompleteWatchTitle(title, expectedTerms);
  return isIntelligentlyRelevantListing(title, radar);
}'''
          if old_relevance not in text:
            raise SystemExit('relevance function not found')
          text = text.replace(old_relevance, new_relevance)
          text = text.replace(
            'isRelevantEbayListing(String(item.title), radar.category, expectedTerms)',
            'isRelevantEbayListing(String(item.title), radar, expectedTerms)',
          )
          path.write_text(text)
          PY
      - name: Install
        working-directory: saas
        run: npm ci
      - name: Lint
        working-directory: saas
        run: npm run lint
      - name: Typecheck
        working-directory: saas
        run: npm run typecheck
      - name: Tests
        working-directory: saas
        run: npm test
      - name: Build
        working-directory: saas
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-key
          APP_BASE_URL: http://localhost:3000
          CRON_SECRET: ci-cron-secret-long-enough
          TELEGRAM_BOT_TOKEN: 000000000:ci-placeholder-token
          TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret-long-enough
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: deal_hunter_cards_bot
          BETA_PRIVATE_MODE: "true"
          ENABLE_EBAY_SOURCE: "false"
          ENABLE_RICARDO_SOURCE: "false"
          ENABLE_ANIBIS_SOURCE: "false"
          ENABLE_TUTTI_SOURCE: "false"
          ENABLE_KOMEHYO_SOURCE: "false"
          ENABLE_MOCK_SOURCE: "false"
        run: npm run build
      - name: Commit integration
        run: |
          rm .github/workflows/query-intelligence-integrate-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add saas/src/lib/query-intelligence.ts saas/src/sources/ebay.adapter.ts .github/workflows/query-intelligence-integrate-once.yml
          git commit -m "Integrate multilingual query intelligence into eBay"
          git push origin feat/query-intelligence-engine

name: Send Deal Hunter release preview once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/send-release-preview-once.yml

permissions:
  contents: write

concurrency:
  group: deal-hunter-release-preview-once
  cancel-in-progress: false

jobs:
  send-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for production alias and send the idempotent admin preview
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://deal-hunter-ai.vercel.app/api/internal/release-preview/dh-qie-20260715-a91f5e"
          response=""
          for attempt in $(seq 1 12); do
            response="$(curl --silent --show-error --fail-with-body --max-time 45 "$endpoint" || true)"
            if RESPONSE="$response" node -e '
              const body = JSON.parse(process.env.RESPONSE || "{}");
              if (!body.ok) process.exit(1);
            '; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Preview endpoint did not return ok: $response" >&2
              exit 1
            fi
            sleep 10
          done
          printf '%s\n' "$response" | tee release-preview-result.json
      - name: Publish safe result summary
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const body = JSON.parse(fs.readFileSync('release-preview-result.json', 'utf8'));
          const lines = [
            '## Telegram release preview',
            '',
            `- Result: **${body.ok ? 'success' : 'failure'}**`,
            `- Already sent before this run: **${Boolean(body.already_sent)}**`,
            `- Recipient: primary administrator only`,
            `- General broadcast: **not started**`,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          NODE
      - name: Remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/send-release-preview-once.yml
          rm -f release-preview-result.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/send-release-preview-once.yml
          git commit -m "Remove completed release preview workflow"
          git push origin main

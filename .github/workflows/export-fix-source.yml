name: Export current fix source

on:
  push:
    branches:
      - fix/telegram-double-reject-live

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: telegram-double-reject-source-${{ github.run_id }}
          path: |
            saas/src/telegram/bot.ts
            saas/src/**/*.test.ts
            saas/package.json
            saas/package-lock.json
            .github/workflows
          if-no-files-found: error
          retention-days: 2

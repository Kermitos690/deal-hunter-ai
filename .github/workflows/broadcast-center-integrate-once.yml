name: Finalize Telegram broadcast center once

on:
  push:
    branches: [feat/telegram-broadcast-center]
    paths:
      - .github/workflows/broadcast-center-integrate-once.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/telegram-broadcast-center
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saas/package-lock.json
      - name: Make failed attempts terminal for the campaign
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('saas/src/telegram/broadcast.ts')
          text = path.read_text()
          old = '["sent", "blocked", "skipped"].includes(String(row.payload?.status))'
          new = '["sent", "failed", "blocked", "skipped"].includes(String(row.payload?.status))'
          if old not in text and new not in text:
              raise SystemExit('delivery terminal-status anchor not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Install
        working-directory: saas
        run: npm ci
      - name: Lint
        working-directory: saas
        run: npm run lint
      - name: Typecheck
        working-directory: saas
        run: npm run typecheck
      - name: Tests
        working-directory: saas
        run: npm test
      - name: Build
        working-directory: saas
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-key
          APP_BASE_URL: http://localhost:3000
          CRON_SECRET: ci-cron-secret-long-enough
          SESSION_SECRET: ci-session-secret-long-enough
          TELEGRAM_BOT_TOKEN: 000000000:ci-placeholder-token
          TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret-long-enough
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: deal_hunter_cards_bot
          ADMIN_TELEGRAM_ID: "123456789"
          BETA_PRIVATE_MODE: "true"
          ENABLE_EBAY_SOURCE: "false"
          ENABLE_RICARDO_SOURCE: "false"
          ENABLE_ANIBIS_SOURCE: "false"
          ENABLE_TUTTI_SOURCE: "false"
          ENABLE_KOMEHYO_SOURCE: "false"
          ENABLE_MOCK_SOURCE: "false"
        run: npm run build
      - name: Commit validated result
        run: |
          rm .github/workflows/broadcast-center-integrate-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add saas/src/telegram/broadcast.ts .github/workflows/broadcast-center-integrate-once.yml
          git commit -m "Finalize Telegram broadcast delivery safeguards"
          git push origin feat/telegram-broadcast-center

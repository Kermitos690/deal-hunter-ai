name: Deal Hunter AI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      SERPAPI_COUNTRIES: ${{ secrets.SERPAPI_COUNTRIES }}

      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACES: ${{ secrets.EBAY_MARKETPLACES }}

      EMAIL_IMAP_SERVER: ${{ secrets.EMAIL_IMAP_SERVER }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

      USD_TO_CHF: ${{ secrets.USD_TO_CHF }}
      EUR_TO_CHF: ${{ secrets.EUR_TO_CHF }}
      GBP_TO_CHF: ${{ secrets.GBP_TO_CHF }}
      JPY_TO_CHF: ${{ secrets.JPY_TO_CHF }}

    steps:
      - name: Télécharger le projet
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer Deal Hunter AI
        run: python main.py